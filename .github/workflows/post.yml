name: 직업 블로그 자동 포스팅

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 오전 8시 KST 시작 (이후 랜덤 딜레이)
  workflow_dispatch:         # 수동 실행 (테스트용)

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 440     # 랜덤 딜레이 최대 7시간 + 여유

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 랜덤 딜레이 (오전 8시~오후 3시 KST 사이 랜덤 발행)
        if: github.event_name == 'schedule'
        run: |
          python3 -c "
          import time, random
          delay = random.randint(0, 25200)
          h, m = divmod(delay, 3600)
          print('대기: ' + str(h) + '시간 ' + str(m // 60) + '분 후 발행')
          time.sleep(delay)
          "

      - name: 포스팅 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
        run: |
          cd $GITHUB_WORKSPACE
          python src/main.py

      - name: 발행 이력 커밋
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "GitHub Actions Bot"
          git pull origin main --no-rebase
          git add published/
          LAST=$(cat published/last_published.txt 2>/dev/null || echo "직업 정보")
          git diff --staged --quiet || git commit -m "✅ 포스팅 완료: ${LAST}"
          for i in 1 2 3; do
            if git push; then
              echo "Push 성공"
              break
            fi
            echo "Push 실패 (${i}/3), 15초 후 재시도..."
            sleep 15
            git pull origin main --no-rebase
          done
